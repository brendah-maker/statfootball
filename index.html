<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatFootball Pro | Live 2025-26 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .active-league { background: rgba(34, 211, 238, 0.1); color: #22d3ee; border-left: 4px solid #22d3ee; }
        .form-dot { width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; margin: 0 1px; color: white; }
        .form-W { background-color: #10b981; } .form-D { background-color: #64748b; } .form-L { background-color: #ef4444; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .loading-shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">

    <!-- Sidebar: Top 10 Leagues -->
    <aside class="w-64 bg-[#0f172a] border-r border-slate-800 hidden lg:flex flex-col flex-shrink-0">
        <div class="p-6 border-b border-slate-800/50">
            <h1 class="text-xl font-black text-cyan-400 tracking-tighter italic">STAT<span class="text-white">FOOTBALL</span></h1>
            <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-widest">API-Sports Dashboard</p>
        </div>
        <nav id="leagueNav" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-1"></nav>
        <div class="p-4 border-t border-slate-800 bg-slate-900/20">
            <div id="apiIndicator" class="flex items-center space-x-2 text-[10px] font-bold text-emerald-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>API CONNECTED</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto custom-scroll">
        <!-- Header -->
        <header class="p-8 flex flex-col md:flex-row md:items-end justify-between sticky top-0 bg-[#020617]/95 backdrop-blur-md z-10 border-b border-slate-800/30">
            <div>
                <div class="flex items-center space-x-2 text-cyan-500 text-[10px] font-black uppercase tracking-widest mb-1">
                    <span id="headerLeague">...</span> <span class="text-slate-700">|</span> <span id="headerSeason">Season 2025/2026</span>
                </div>
                <h2 id="viewTitle" class="text-4xl font-black text-white tracking-tight">League Standings</h2>
            </div>
            <div class="flex items-center space-x-3 mt-4 md:mt-0">
                <div class="bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-full text-[10px] font-bold text-red-500 uppercase">
                    <span id="injuryCount">--</span> Injuries
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-black text-slate-300 uppercase tracking-widest">Live Data</div>
            </div>
        </header>

        <!-- Dashboard Grid -->
        <div class="p-8 grid grid-cols-12 gap-8">
            
            <!-- Standings Table -->
            <div class="col-span-12 xl:col-span-8">
                <div class="bg-[#0f172a] rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                    <div class="px-6 py-4 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Official Standings</span>
                        <span id="syncLabel" class="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-500 uppercase font-black tracking-widest">Connecting...</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-slate-500 font-bold uppercase bg-slate-900/50">
                                <tr>
                                    <th class="px-6 py-5">#</th>
                                    <th class="px-6 py-5">Club</th>
                                    <th class="px-4 py-5 text-center">MP</th>
                                    <th class="px-2 py-5 text-center">W</th>
                                    <th class="px-2 py-5 text-center">D</th>
                                    <th class="px-2 py-5 text-center">L</th>
                                    <th class="px-2 py-5 text-center">GF</th>
                                    <th class="px-2 py-5 text-center">GA</th>
                                    <th class="px-4 py-5 text-center">GD</th>
                                    <th class="px-4 py-5 text-center">Pts</th>
                                    <th class="px-6 py-5 text-right">Last 5</th>
                                </tr>
                            </thead>
                            <tbody id="standingsBody" class="divide-y divide-slate-800/40 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Stats Columns -->
            <div class="col-span-12 xl:col-span-4 space-y-6">
                <!-- Top Scorers -->
                <div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800">
                    <h4 class="text-xs font-black text-slate-500 uppercase mb-4 flex justify-between">Top Scorers <i class="fa-solid fa-fire text-orange-500"></i></h4>
                    <div id="topScorers" class="space-y-2"></div>
                </div>

                <!-- Top Assists -->
                <div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800">
                    <h4 class="text-xs font-black text-slate-500 uppercase mb-4 flex justify-between">Top Assists <i class="fa-solid fa-magic text-cyan-400"></i></h4>
                    <div id="topAssists" class="space-y-2"></div>
                </div>

                <!-- Clean Sheets -->
                <div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800">
                    <h4 class="text-xs font-black text-slate-500 uppercase mb-4 flex justify-between">Yellow Cards <i class="fa-solid fa-clone text-yellow-500"></i></h4>
                    <div id="topYellows" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "65a3207dce4446073729a1e509ba3278";
        const BASE_URL = "https://v3.football.api-sports.io";

        const LEAGUES = [
            { id: 39, name: "Premier League", country: "ENG" },
            { id: 140, name: "La Liga", country: "ESP" },
            { id: 78, name: "Bundesliga", country: "GER" },
            { id: 135, name: "Serie A", country: "ITA" },
            { id: 61, name: "Ligue 1", country: "FRA" },
            { id: 88, name: "Eredivisie", country: "NED" },
            { id: 94, name: "Primeira Liga", country: "POR" },
            { id: 71, name: "Série A", country: "BRA" },
            { id: 253, name: "MLS", country: "USA" },
            { id: 307, name: "Pro League", country: "KSA" }
        ];

        let activeSeason = 2025;
        let activeLeagueId = 39;

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${BASE_URL}/${endpoint}`, {
                    headers: { "x-apisports-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await response.json();
                return data.response;
            } catch (e) { console.error(e); return []; }
        }

        async function loadDashboard(leagueId) {
            activeLeagueId = leagueId;
            const league = LEAGUES.find(l => l.id === leagueId);
            document.getElementById('headerLeague').innerText = league.name;
            document.getElementById('syncLabel').innerText = "SYNCING...";
            renderSidebar();

            // Clear UI
            document.getElementById('standingsBody').innerHTML = '<tr><td colspan="11" class="py-24 loading-shimmer"></td></tr>';
            document.getElementById('topScorers').innerHTML = '';
            document.getElementById('topAssists').innerHTML = '';
            document.getElementById('topYellows').innerHTML = '';

            // Step 1: Fetch Standings
            let standings = await fetchAPI(`standings?league=${leagueId}&season=${activeSeason}`);
            
            // Fallback: If 2025 is empty, try 2024
            if (!standings || standings.length === 0) {
                activeSeason = 2024;
                document.getElementById('headerSeason').innerText = `Season 2024/2025`;
                standings = await fetchAPI(`standings?league=${leagueId}&season=${activeSeason}`);
            } else {
                document.getElementById('headerSeason').innerText = `Season 2025/2026`;
            }

            if (standings && standings[0]) {
                renderStandings(standings[0].league.standings[0]);
                document.getElementById('syncLabel').innerText = "DATA LIVE";
            } else {
                document.getElementById('standingsBody').innerHTML = '<tr><td colspan="11" class="p-10 text-center text-slate-500">No data found for this season.</td></tr>';
                document.getElementById('syncLabel').innerText = "ERROR";
            }

            // Step 2: Fetch Player Stats
            const scorers = await fetchAPI(`players/topscorers?league=${leagueId}&season=${activeSeason}`);
            renderStatList(scorers?.slice(0, 5), 'topScorers', 'goals.total', 'text-cyan-400');

            const assists = await fetchAPI(`players/topassists?league=${leagueId}&season=${activeSeason}`);
            renderStatList(assists?.slice(0, 5), 'topAssists', 'goals.assists', 'text-cyan-400');

            const yellows = await fetchAPI(`players/topyellowcards?league=${leagueId}&season=${activeSeason}`);
            renderStatList(yellows?.slice(0, 3), 'topYellows', 'cards.yellow', 'text-yellow-500');

            // Step 3: Injuries
            const injuries = await fetchAPI(`injuries?league=${leagueId}&season=${activeSeason}`);
            document.getElementById('injuryCount').innerText = injuries?.length || 0;
        }

        function renderStandings(data) {
            document.getElementById('standingsBody').innerHTML = data.map(team => {
                const form = team.form || "";
                const formHtml = form.split('').map(f => `<span class="form-dot form-${f}">${f}</span>`).join('');
                
                return `
                <tr class="hover:bg-cyan-500/5 transition cursor-pointer group">
                    <td class="px-6 py-4 font-bold text-slate-500">${team.rank}</td>
                    <td class="px-6 py-4 flex items-center font-bold">
                        <img src="${team.team.logo}" class="w-6 h-6 mr-3">
                        <span class="group-hover:text-cyan-400 transition">${team.team.name}</span>
                    </td>
                    <td class="px-4 py-4 text-center font-mono text-slate-400 text-xs">${team.all.played}</td>
                    <td class="px-2 py-4 text-center font-mono text-emerald-500 font-bold">${team.all.win}</td>
                    <td class="px-2 py-4 text-center font-mono text-slate-400">${team.all.draw}</td>
                    <td class="px-2 py-4 text-center font-mono text-red-500">${team.all.lose}</td>
                    <td class="px-2 py-4 text-center font-mono text-slate-500">${team.all.goals.for}</td>
                    <td class="px-2 py-4 text-center font-mono text-slate-500">${team.all.goals.against}</td>
                    <td class="px-4 py-4 text-center font-mono ${team.goalsDiff >= 0 ? 'text-emerald-500' : 'text-red-500'} text-xs">
                        ${team.goalsDiff > 0 ? '+' : ''}${team.goalsDiff}
                    </td>
                    <td class="px-4 py-4 text-center font-black text-cyan-400 text-lg">${team.points}</td>
                    <td class="px-6 py-4 text-right">${formHtml}</td>
                </tr>`;
            }).join('');
        }

        function renderStatList(data, containerId, path, color) {
            const container = document.getElementById(containerId);
            if (!data || data.length === 0) { container.innerHTML = '<p class="text-center text-xs text-slate-700 py-4 italic">No data</p>'; return; }
            
            container.innerHTML = data.map(item => {
                const val = path.split('.').reduce((o, k) => o[k], item.statistics[0]) || 0;
                return `
                <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-2xl border border-slate-800">
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <img src="${item.player.photo}" class="w-8 h-8 rounded-full border border-slate-700">
                        <div class="truncate">
                            <p class="text-[10px] font-bold text-white truncate">${item.player.name}</p>
                            <p class="text-[8px] text-slate-500 uppercase truncate">${item.statistics[0].team.name}</p>
                        </div>
                    </div>
                    <span class="${color} font-black text-sm">${val}</span>
                </div>`;
            }).join('');
        }

        function renderSidebar() {
            document.getElementById('leagueNav').innerHTML = LEAGUES.map(l => `
                <button onclick="loadDashboard(${l.id})" class="w-full flex items-center p-3 rounded-xl text-sm transition font-semibold mb-1 ${l.id === activeLeagueId ? 'active-league' : 'text-slate-400 hover:bg-slate-800/50 hover:text-white'}">
                    <span class="w-8 text-[9px] font-black opacity-30 text-left">${l.country}</span>
                    <span class="truncate">${l.name}</span>
                </button>`).join('');
        }

        // Initialize
        window.onload = () => loadDashboard(39);
    </script>
</body>
</html>
