<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs | StatFootball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .article-card {
            border: 2px solid #1e293b;
            transition: all 0.2s ease;
        }
        .article-card:hover {
            transform: translateX(5px);
            background-color: #f1f5f9;
            border-color: #4f46e5;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <header class="bg-white border-b border-slate-100 py-6 sticky top-0 z-50 backdrop-blur-md bg-white/95">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-indigo-600 italic">STAT<span class="text-slate-900">FOOTBALL</span></a>
            <nav class="flex space-x-8 items-center">
                <a href="index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition">Live Dashboard</a>
                <span class="text-sm font-black text-indigo-600 border-b-2 border-indigo-600 pb-1 cursor-default">Blogs</span>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-12">
        
        <!-- Header from Sketch -->
        <div class="mb-12">
            <h1 class="text-4xl font-black text-slate-900 inline-block border-b-4 border-indigo-600 pb-1">Blogs</h1>
        </div>

        <!-- Blog List Container -->
        <div class="space-y-6">

            <!-- Article 1 -->
            <div class="article-card bg-white p-6 rounded-xl flex justify-between items-center group">
                <div>
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Latest Update</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-900">Arsenal Crowned Champions!</h2>
                </div>
                <a href="arsenal-news.html" class="flex items-center space-x-2 text-xs font-black uppercase tracking-tighter text-slate-400 group-hover:text-indigo-600 transition">
                    <span>read more</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

            <!-- Article 2 -->
            <div class="article-card bg-white p-6 rounded-xl flex justify-between items-center group">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tactical Analysis</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-900">How Bournemouth Stunned Man City</h2>
                </div>
                <a href="#" class="flex items-center space-x-2 text-xs font-black uppercase tracking-tighter text-slate-400 group-hover:text-indigo-600 transition">
                    <span>read more</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

            <!-- Article 3 -->
            <div class="article-card bg-white p-6 rounded-xl flex justify-between items-center group">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Transfers</span>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-900">Top 5 Breakout Stars to Watch in 2026</h2>
                </div>
                <a href="#" class="flex items-center space-x-2 text-xs font-black uppercase tracking-tighter text-slate-400 group-hover:text-indigo-600 transition">
                    <span>read more</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 py-10 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-[0.3em] font-bold">&copy; 2026 StatFootball Global Media</p>
    </footer>

</body>
</html>
