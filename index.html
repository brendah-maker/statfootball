<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StatMaster - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-white flex min-h-screen">

    <aside class="w-64 bg-[#1e293b] border-r border-gray-800 p-6 space-y-8">
        <div>
            <h3 class="text-xs font-semibold text-gray-500 uppercase mb-4">Categories</h3>
            <nav class="space-y-2">
                <button onclick="filterLeagues('football')" class="w-full flex items-center justify-between bg-cyan-600/20 text-cyan-400 p-3 rounded-xl border border-cyan-500/30">
                    <span><i class="fa-solid fa-futbol mr-3"></i> Football</span>
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
                <button onclick="filterLeagues('cricket')" class="w-full flex items-center text-gray-400 p-3 hover:text-white transition">
                    <i class="fa-solid fa-cricket-bat-ball mr-3"></i> Cricket
                </button>
                <button onclick="filterLeagues('basketball')" class="w-full flex items-center text-gray-400 p-3 hover:text-white transition">
                    <i class="fa-solid fa-basketball mr-3"></i> Basketball
                </button>
            </nav>
        </div>
        <div>
            <h3 class="text-xs font-semibold text-gray-500 uppercase mb-4">Player Search</h3>
            <input type="text" placeholder="Type 'Gabriel Martinelli'..." class="w-full bg-[#0f172a] border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-cyan-500 outline-none">
        </div>
    </aside>

    <main class="flex-1 p-8">
        <nav class="flex space-x-8 border-b border-gray-800 mb-8 pb-4 text-sm font-medium text-gray-400">
            <a href="index.html" class="text-white border-b-2 border-cyan-400 pb-4">Home</a>
            <a href="live-scores.html" class="hover:text-white">Live Scores</a>
            <a href="fixtures.html" class="hover:text-white">Fixtures</a>
            <a href="rankings.html" class="hover:text-white">Rankings</a>
        </nav>

        <h1 id="league-heading" class="text-2xl font-bold mb-6">Football Leagues</h1>
        
        <div id="league-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-gray-800 hover:border-cyan-500 cursor-pointer">
                <img src="https://media.api-sports.io/football/leagues/39.png" class="w-12 mb-4">
                <h3 class="font-bold">Premier League</h3>
            </div>
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-gray-800 hover:border-cyan-500 cursor-pointer">
                <img src="https://media.api-sports.io/football/leagues/140.png" class="w-12 mb-4">
                <h3 class="font-bold">La Liga</h3>
            </div>
        </div>
    </main>

    <script>
        const data = {
            football: ["Premier League", "La Liga", "Champions League"],
            cricket: ["IPL", "T20 World Cup", "The Ashes"],
            basketball: ["NBA", "EuroLeague", "NCAA"]
        };

        function filterLeagues(sport) {
            const grid = document.getElementById('league-grid');
            document.getElementById('league-heading').innerText = sport.charAt(0).toUpperCase() + sport.slice(1) + " Leagues";
            grid.innerHTML = data[sport].map(league => `
                <div class="bg-[#1e293b] p-6 rounded-2xl border border-gray-800 hover:border-cyan-500 cursor-pointer">
                    <div class="w-12 h-12 bg-gray-700 rounded mb-4 flex items-center justify-center font-bold text-xs uppercase">${league.substring(0,3)}</div>
                    <h3 class="font-bold">${league}</h3>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
