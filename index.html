<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatFootball | Global Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden-rows { display: none; }
        .expanded .hidden-rows { display: table-row; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .active-league { background: rgba(8, 145, 178, 0.2); color: #22d3ee; border-left: 4px solid #22d3ee; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 flex min-h-screen font-sans">

    <aside class="w-72 bg-[#1e293b] border-r border-gray-800 hidden lg:flex flex-col fixed h-full overflow-y-auto">
        <div class="p-6 sticky top-0 bg-[#1e293b] z-10 border-b border-gray-800/50">
            <h1 class="text-xl font-bold text-cyan-400 tracking-tight mb-2">STAT<span class="text-white">FOOTBALL</span></h1>
            <input type="text" id="playerSearchInput" placeholder="Search Player (e.g. Martinelli)" 
                   class="w-full bg-[#0f172a] border border-gray-700 rounded-lg p-2 text-xs mt-4 focus:border-cyan-400 outline-none">
        </div>
        
        <nav id="sidebarLeagues" class="flex-1 px-4 py-6 space-y-1"></nav>

        <div class="mt-auto sticky bottom-0 bg-[#1e293b] p-6 border-t border-gray-800">
            <div class="bg-[#0f172a] p-4 rounded-xl border border-gray-800">
                <p class="text-[10px] text-gray-500 uppercase mb-2">Quick Access</p>
                <div class="flex items-center space-x-3">
                    <img src="https://media.api-sports.io/football/teams/42.png" class="w-8 h-8">
                    <span class="font-bold text-sm">Arsenal FC</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 lg:ml-72 p-6 lg:p-10">
        <header id="dashboardHeader" class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h2 id="viewTitle" class="text-3xl font-extrabold tracking-tight">Premier League Summary</h2>
                <p id="viewSubtitle" class="text-gray-400 mt-1">Season 2025 • Active Data</p>
            </div>
        </header>

        <section id="playerProfileView" class="hidden mb-10">
            <div class="bg-gradient-to-r from-red-600 to-red-800 rounded-3xl p-8 flex flex-col md:flex-row items-center gap-8 shadow-2xl relative overflow-hidden">
                <img id="profilePhoto" src="" class="w-40 h-40 rounded-full border-4 border-white/20 bg-gray-900 z-10">
                <div class="z-10 text-center md:text-left">
                    <h2 id="profileName" class="text-4xl font-black uppercase italic"></h2>
                    <p id="profileTeam" class="text-white/80 font-bold tracking-widest"></p>
                    <div class="grid grid-cols-3 gap-6 mt-6">
                        <div class="text-center bg-black/20 p-3 rounded-xl"><p class="text-[10px] uppercase">Goals</p><p id="statGoals" class="text-2xl font-black">-</p></div>
                        <div class="text-center bg-black/20 p-3 rounded-xl"><p class="text-[10px] uppercase">Assists</p><p id="statAssists" class="text-2xl font-black">-</p></div>
                        <div class="text-center bg-black/20 p-3 rounded-xl"><p class="text-[10px] uppercase">Matches</p><p id="statPlayed" class="text-2xl font-black">-</p></div>
                    </div>
                </div>
                <button onclick="backToDashboard()" class="absolute top-4 right-6 text-white/50 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
        </section>

        <div id="mainDashboardGrid" class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-8 space-y-8">
                <div class="bg-[#1e293b] rounded-3xl border border-gray-800 overflow-hidden shadow-2xl" id="tableWrapper">
                    <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-gray-800/30">
                        <h3 class="font-bold text-lg">League Standings</h3>
                    </div>
                    <table class="w-full text-left" id="leagueTable">
                        <thead class="bg-gray-900/50 text-gray-500 text-[10px] uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Pos</th>
                                <th class="px-6 py-4">Club</th>
                                <th class="px-6 py-4 text-center">PL</th>
                                <th class="px-6 py-4 text-center">GD</th>
                                <th class="px-6 py-4 text-right pr-10">Pts</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-800/50"></tbody>
                    </table>
                </div>
            </div>

            <div class="xl:col-span-4 space-y-6">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-gray-800">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-tighter mb-6 flex justify-between">Top Scorers <i class="fa-solid fa-bolt text-amber-400"></i></h3>
                    <div id="topScorers" class="space-y-3"></div>
                </div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-gray-800">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-tighter mb-6 flex justify-between">Most Red Cards <i class="fa-solid fa-square text-red-500"></i></h3>
                    <div id="topCards" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "d7d3e478e3dc124b96e284ed62a2cd85";
        const SEASON = 2025;
        const MAJOR_LEAGUES = [
            { id: 39, name: "Premier League", country: "England" },
            { id: 140, name: "La Liga", country: "Spain" },
            { id: 78, name: "Bundesliga", country: "Germany" },
            { id: 135, name: "Serie A", country: "Italy" },
            { id: 61, name: "Ligue 1", country: "France" },
            { id: 2, name: "Champions League", country: "Europe" }
        ];

        let currentLeagueId = 39;
        const headers = { "x-apisports-key": API_KEY };

        // 1. INITIALIZE SIDEBAR
        function initSidebar() {
            const container = document.getElementById('sidebarLeagues');
            container.innerHTML = MAJOR_LEAGUES.map(league => `
                <button onclick="changeLeague(${league.id}, '${league.name}')" 
                        class="w-full flex items-center p-3 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 transition text-sm ${league.id === currentLeagueId ? 'active-league' : ''}">
                    <span class="mr-3 text-[10px] opacity-40 font-bold uppercase w-12">${league.country.substring(0,3)}</span>
                    <span class="font-semibold">${league.name}</span>
                </button>
            `).join('');
        }

        // 2. SEARCH FOR PLAYER (e.g. Martinelli)
        document.getElementById('playerSearchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchPlayer(this.value);
        });

        async function fetchPlayer(name) {
            const res = await fetch(`https://v3.football.api-sports.io/players?search=${name}&season=${SEASON}`, { headers });
            const data = await res.json();
            if (data.response.length > 0) showPlayerProfile(data.response[0]);
        }

        function showPlayerProfile(playerData) {
            const p = playerData.player;
            const s = playerData.statistics[0];
            document.getElementById('mainDashboardGrid').classList.add('hidden');
            document.getElementById('playerProfileView').classList.remove('hidden');
            document.getElementById('profileName').innerText = p.name;
            document.getElementById('profilePhoto').src = p.photo;
            document.getElementById('profileTeam').innerText = s.team.name + " | " + s.games.position;
            document.getElementById('statGoals').innerText = s.goals.total || 0;
            document.getElementById('statAssists').innerText = s.goals.assists || 0;
            document.getElementById('statPlayed').innerText = s.games.appearences || 0;
        }

        function backToDashboard() {
            document.getElementById('mainDashboardGrid').classList.remove('hidden');
            document.getElementById('playerProfileView').classList.add('hidden');
        }

        // 3. FETCH DASHBOARD CONTENT
        async function fetchDashboard(leagueId) {
            try {
                // Table
                const stdRes = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=${SEASON}`, { headers });
                const stdData = await stdRes.json();
                renderTable(stdData.response[0].league.standings[0]);

                // Scorers
                const scRes = await fetch(`https://v3.football.api-sports.io/players/topscorers?league=${leagueId}&season=${SEASON}`, { headers });
                const scData = await scRes.json();
                renderLeaderboard(scData.response.slice(0, 5), 'topScorers', 'goals');

                // Red Cards
                const cardRes = await fetch(`https://v3.football.api-sports.io/players/topredcards?league=${leagueId}&season=${SEASON}`, { headers });
                const cardData = await cardRes.json();
                renderLeaderboard(cardData.response.slice(0, 5), 'topCards', 'red');
            } catch (e) { console.log(e); }
        }

        function renderTable(standings) {
            document.querySelector("#leagueTable tbody").innerHTML = standings.map((team, i) => `
                <tr class="hover:bg-gray-800 transition border-b border-gray-800/30">
                    <td class="px-6 py-4 font-black ${i < 4 ? 'text-cyan-400' : 'text-gray-500'}">${team.rank}</td>
                    <td class="px-6 py-4 font-bold flex items-center"><img src="${team.team.logo}" class="w-5 h-5 mr-3">${team.team.name}</td>
                    <td class="px-6 py-4 text-center text-gray-400">${team.all.played}</td>
                    <td class="px-6 py-4 text-center ${team.goalsDiff > 0 ? 'text-emerald-500' : 'text-red-500'}">${team.goalsDiff}</td>
                    <td class="px-6 py-4 text-right pr-10 font-black">${team.points}</td>
                </tr>
            `).join('');
        }

        function renderLeaderboard(data, containerId, type) {
            document.getElementById(containerId).innerHTML = data.map((p, i) => `
                <div class="flex items-center justify-between bg-[#0f172a] p-3 rounded-xl border border-gray-800">
                    <div class="flex items-center space-x-3">
                        <img src="${p.player.photo}" class="w-8 h-8 rounded-full">
                        <span class="text-xs font-bold">${p.player.name}</span>
                    </div>
                    <span class="font-black ${type==='red'?'text-red-500':'text-cyan-400'}">
                        ${type==='goals' ? p.statistics[0].goals.total : p.statistics[0].cards.red}
                    </span>
                </div>
            `).join('');
        }

        function changeLeague(id, name) {
            currentLeagueId = id;
            document.getElementById('viewTitle').innerText = name + " Summary";
            initSidebar();
            fetchDashboard(id);
        }

        initSidebar();
        fetchDashboard(39);
    </script>
</body>
</html>
