<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatFootball | Live Pro Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .active-league { background: #eef2ff; color: #4f46e5; border-right: 4px solid #4f46e5; font-weight: 700; }
        .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        .form-dot { width: 20px; height: 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; margin: 0 1px; color: white; }
        .form-W { background-color: #10b981; } .form-D { background-color: #94a3b8; } .form-L { background-color: #f43f5e; }
        .card-shadow { box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .round-pill { flex-shrink: 0; padding: 6px 16px; border-radius: 99px; font-size: 11px; font-weight: 800; border: 1px solid #e2e8f0; transition: all 0.2s; cursor: pointer; background: white; color: #64748b; }
        .round-pill.active { background: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        @keyframes live-pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .animate-live { animation: live-pulse 2s infinite; }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">

    <!-- Sidebar: Top 15 Leagues -->
    <aside class="w-64 bg-white border-r border-slate-200 hidden lg:flex flex-col flex-shrink-0 z-20">
        <div class="p-8 border-b border-slate-100 text-center">
            <h1 class="text-2xl font-black text-indigo-600 italic leading-none">STAT<span class="text-slate-900">FOOTBALL</span></h1>
        </div>
        <nav id="leagueNav" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-1"></nav>
        <div class="p-6 border-t border-slate-100 bg-slate-50/50">
            <div class="flex items-center space-x-2 text-[10px] font-bold text-emerald-600 uppercase">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="apiStatus">System Online</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto custom-scroll">
        <header class="p-8 pb-0 sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-slate-100">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <div class="flex items-center space-x-3 text-indigo-500 text-[11px] font-black uppercase tracking-widest mb-1">
                        <span id="headerLeague">...</span> <span class="text-slate-300">|</span> 
                        <select id="seasonSelector" onchange="changeSeason(this.value)" class="bg-transparent border-none font-black cursor-pointer">
                            <option value="2025">2025/26</option><option value="2024">2024/25</option><option value="2023">2023/24</option>
                        </select>
                    </div>
                    <h2 id="viewTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight leading-none">Dashboard</h2>
                </div>
            </div>
            <nav class="flex space-x-8">
                <button onclick="switchTab('summary')" id="tab-summary" class="pb-4 text-sm font-bold text-slate-400 active-tab">Summary</button>
                <button onclick="switchTab('matches')" id="tab-matches" class="pb-4 text-sm font-bold text-slate-400">Fixtures & Live</button>
                <button onclick="switchTab('predictions')" id="tab-predictions" class="pb-4 text-sm font-bold text-slate-400">Predictions</button>
            </nav>
        </header>

        <div class="p-8 space-y-8">
            <!-- SUMMARY VIEW -->
            <div id="view-summary" class="space-y-8">
                <section class="bg-white rounded-3xl border border-slate-200 overflow-hidden card-shadow">
                    <table class="w-full text-left">
                        <thead class="text-[10px] text-slate-400 font-bold uppercase bg-slate-50/50">
                            <tr><th class="px-8 py-5">#</th><th class="px-6 py-5">Club</th><th class="px-4 py-5 text-center">MP</th><th class="px-2 py-5 text-center">W</th><th class="px-2 py-5 text-center">L</th><th class="px-4 py-5 text-center">Pts</th><th class="px-8 py-5 text-right">Form</th></tr>
                        </thead>
                        <tbody id="standingsBody" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                    <button onclick="toggleStandings()" class="w-full py-4 text-[10px] font-black text-indigo-600 hover:bg-slate-50 uppercase border-t border-slate-100">Toggle Full Table</button>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 card-shadow"><h4 class="text-[9px] font-black text-slate-400 uppercase mb-3">Top Goals</h4><div id="topScorers" class="space-y-1"></div></div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 card-shadow"><h4 class="text-[9px] font-black text-slate-400 uppercase mb-3">Top Assists</h4><div id="topAssists" class="space-y-1"></div></div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 card-shadow"><h4 class="text-[9px] font-black text-slate-400 uppercase mb-3">Yellows</h4><div id="topYellows" class="space-y-1"></div></div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 card-shadow"><h4 class="text-[9px] font-black text-slate-400 uppercase mb-3">Reds</h4><div id="topReds" class="space-y-1"></div></div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 card-shadow"><h4 class="text-[9px] font-black text-slate-400 uppercase mb-3">Clean Sheets</h4><div id="topSheets" class="space-y-1"></div></div>
                </div>
            </div>

            <!-- MATCHES VIEW -->
            <div id="view-matches" class="hidden space-y-6">
                <div class="flex items-center space-x-4 overflow-x-auto pb-4 custom-scroll" id="roundRibbon"></div>
                <div id="matchDayDisplay" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- PREDICTIONS VIEW -->
            <div id="view-predictions" class="hidden"><div id="predictionDisplay"></div></div>
        </div>
    </main>

    <script>
        const CONFIG = { KEY: "65a3207dce4446073729a1e509ba3278", BASE: "https://v3.football.api-sports.io" };
        const LEAGUES = [
            { id: 39, name: "Premier League", country: "ENG" }, { id: 140, name: "La Liga", country: "ESP" }, { id: 78, name: "Bundesliga", country: "GER" },
            { id: 135, name: "Serie A", country: "ITA" }, { id: 61, name: "Ligue 1", country: "FRA" }, { id: 88, name: "Eredivisie", country: "NED" },
            { id: 94, name: "Primeira Liga", country: "POR" }, { id: 253, name: "MLS", country: "USA" }, { id: 307, name: "Pro League", country: "KSA" },
            { id: 71, name: "Série A", country: "BRA" }, { id: 179, name: "Premiership", country: "SCO" }, { id: 203, name: "Süper Lig", country: "TUR" },
            { id: 98, name: "J1 League", country: "JPN" }, { id: 262, name: "Liga MX", country: "MEX" }, { id: 144, name: "Championship", country: "ENG" }
        ];

        let state = { leagueId: 39, season: 2025, tab: 'summary', standings: [], expanded: false, currentRound: null };
        let refreshInterval = null;

        async function api(path) {
            const r = await fetch(`${CONFIG.BASE}/${path}`, { headers: { "x-apisports-key": CONFIG.KEY, "x-rapidapi-host": "v3.football.api-sports.io" } });
            const d = await r.json(); return d.response;
        }

        async function switchTab(t) {
            state.tab = t;
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.add('active-tab');
            document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${t}`).classList.remove('hidden');
            
            // Clean up polling when leaving matches tab
            clearInterval(refreshInterval);
            if (t === 'matches') {
                loadRounds();
                refreshInterval = setInterval(() => { if(state.currentRound) loadRoundFixtures(state.currentRound, true); }, 60000);
            }
        }

        async function loadDashboard(id) {
            state.leagueId = id; renderSidebar();
            const res = await api(`standings?league=${id}&season=${state.season}`);
            if (res && res[0]) {
                state.standings = res[0].league.standings[0];
                renderStandings();
                loadStats();
            }
        }

        function renderStandings() {
            const data = state.expanded ? state.standings : state.standings.slice(0,10);
            document.getElementById('standingsBody').innerHTML = data.map(t => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-8 py-4 font-black text-slate-300 text-[10px]">${t.rank}</td>
                    <td class="px-6 py-4 flex items-center font-bold text-slate-700 text-xs"><img src="${t.team.logo}" class="w-5 h-5 mr-3"> ${t.team.name}</td>
                    <td class="px-4 py-4 text-center text-xs">${t.all.played}</td>
                    <td class="px-2 py-4 text-center font-bold text-emerald-500 text-xs">${t.all.win}</td>
                    <td class="px-2 py-4 text-center font-bold text-rose-500 text-xs">${t.all.lose}</td>
                    <td class="px-4 py-4 text-center font-black text-indigo-600 text-sm">${t.points}</td>
                    <td class="px-8 py-4 text-right">${(t.form || "").split('').map(f => `<span class="form-dot form-${f}">${f}</span>`).join('')}</td>
                </tr>`).join('');
        }

        function toggleStandings() { state.expanded = !state.expanded; renderStandings(); }

        async function loadRounds() {
            const rounds = await api(`fixtures/rounds?league=${state.leagueId}&season=${state.season}`);
            const current = await api(`fixtures/rounds?league=${state.leagueId}&season=${state.season}&current=true`);
            const target = current[0] || rounds[rounds.length-1];
            
            document.getElementById('roundRibbon').innerHTML =
